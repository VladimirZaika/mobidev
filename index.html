<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Site Under Construction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
        }

        body {
            background-color: #1e1e1e;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        .construction-section {
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .construction-container {
            width: 100%;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            max-width: 1280px;
        }

        .construction-image {
            width: 100%;
            height: 100%;
            max-width: 100%;
            display: block;
            object-fit: cover;
        }

        @media screen and (min-width: 768px) {
            .construction-container {
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <section id="construction" class="construction-section">
        <div class="construction-container">
            <img src="/wp-content/uploads/2026/05/abstract-construction-background-vector-illustration.png" alt="Web Site Under Construction" class="construction-image">
        </div>
    </section>
</body>
</html>
